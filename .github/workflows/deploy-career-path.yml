# ============================================================
# CI：职业路径决策测试
# EdgeOne Git 集成自动部署，这里只做构建验证 + path filter
# ============================================================
# 新增项目模板（复制本文件，改下面值）：
#   name:              CI <项目名>
#   paths:             'xiaohongshu/<子目录>/**'
#   working-directory:  xiaohongshu/<子目录>
# ============================================================
name: CI Career Path Quiz

on:
  push:
    branches: [main]
    paths:
      - 'xiaohongshu/career-path-test/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & Build
        working-directory: xiaohongshu/career-path-test
        run: npm install && npm run build

      - name: Verify build output
        run: |
          if [ -f xiaohongshu/career-path-test/dist/index.html ]; then
            echo "✅ Build OK — EdgeOne will auto-deploy from Git"
          else
            echo "❌ dist/index.html not found!"
            exit 1
          fi
