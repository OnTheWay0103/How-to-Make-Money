# ============================================================
# CI/CD：婚姻情感诊断测试
# 构建 + CLI 部署到 EdgeOne（Upload 型项目）
# ============================================================
name: Deploy Relationship Test

on:
  push:
    branches: [main]
    paths:
      - 'xiaohongshu/relationship-test/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & Build
        working-directory: xiaohongshu/relationship-test
        run: npm install && npm run build

      - name: Deploy to EdgeOne
        working-directory: xiaohongshu/relationship-test
        run: |
          npm install -g edgeone
          edgeone makers deploy ./dist \
            -n relationship-test-quiz \
            -t ${{ secrets.EDGEONE_API_TOKEN }} \
            -e production
